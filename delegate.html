<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delegate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Active Incidents</h1>
        
        <div class="flex gap-2 mb-8">
            <input type="text" id="viewCompId" placeholder="Comp ID (e.g. Falkirk2026)" class="flex-1 p-3 rounded text-black">
            <button onclick="startListening()" class="bg-green-600 px-6 py-3 rounded font-bold">MONITOR</button>
        </div>

        <div id="list" class="space-y-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBHi5A8vQ9ybvI2czdZxfu5PI17VILnizo",
          authDomain: "comp-help.firebaseapp.com",
          projectId: "comp-help",
          storageBucket: "comp-help.firebasestorage.app",
          messagingSenderId: "680195695602",
          appId: "1:680195695602:web:4d85286336add69645816b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.startListening = () => {
            const cID = document.getElementById('viewCompId').value.trim();
            if(!cID) return;
            
            const dbRef = ref(db, 'requests/' + cID);

            onValue(dbRef, (snapshot) => {
                const listDiv = document.getElementById('list');
                listDiv.innerHTML = "";
                
                snapshot.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    
                    listDiv.innerHTML += `
                        <div class="bg-gray-800 p-4 rounded-lg border-l-8 border-red-500 flex justify-between items-center shadow-lg">
                            <div>
                                <span class="text-3xl font-black text-red-400 mr-4">#${data.station}</span>
                                <span class="text-xl">${data.issue || 'General Help'}</span>
                            </div>
                            <button onclick="resolve('${cID}', '${id}')" class="bg-green-600 p-3 rounded">DONE</button>
                        </div>
                    `;
                });
            });
        };

        window.resolve = (cID, id) => {
            remove(ref(db, `requests/${cID}/${id}`));
        };
    </script>
</body>
</html>
