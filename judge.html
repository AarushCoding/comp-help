<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCA Help Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Call a Delegate</h1>
        
        <input type="text" id="compId" placeholder="Competition ID (e.g. StevenageMarch2026)" class="w-full p-3 mb-4 border rounded">
        <input type="number" id="station" placeholder="Station Number" class="w-full p-3 mb-4 border rounded">
        
        <p class="font-semibold mb-2">Quick Issues:</p>
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="setIssue('+2 / DNF')" class="bg-blue-500 text-white p-2 rounded text-sm">+2 / DNF</button>
            <button onclick="setIssue('Puzzle Pop')" class="bg-blue-500 text-white p-2 rounded text-sm">Pop</button>
            <button onclick="setIssue('Timer Error')" class="bg-blue-500 text-white p-2 rounded text-sm">Timer</button>
            <button onclick="setIssue('Extra Attempt')" class="bg-blue-500 text-white p-2 rounded text-sm">Extra</button>
        </div>

        <textarea id="issue" placeholder="Describe the issue..." class="w-full p-3 mb-4 border rounded h-24"></textarea>
        
        <button onclick="sendRequest()" id="sendBtn" class="w-full bg-red-600 text-white font-bold py-4 rounded-lg hover:bg-red-700">SEND REQUEST</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBHi5A8vQ9ybvI2czdZxfu5PI17VILnizo",
          authDomain: "comp-help.firebaseapp.com",
          projectId: "comp-help",
          storageBucket: "comp-help.firebasestorage.app",
          messagingSenderId: "680195695602",
          appId: "1:680195695602:web:4d85286336add69645816b",
          databaseURL: "https://comp-help-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.setIssue = (val) => document.getElementById('issue').value = val;

        window.sendRequest = () => {
            const cID = document.getElementById('compId').value.trim();
            const station = document.getElementById('station').value;
            const issue = document.getElementById('issue').value;

            if (!cID || !station) return alert("Fill in Comp ID and Station!");

            const listRef = ref(db, 'requests/' + cID);
            push(listRef, {
                station,
                issue,
                time: serverTimestamp()
            }).then(() => {
                alert("Delegate notified!");
                document.getElementById('issue').value = "";
            });
        };
    </script>
</body>
</html>
